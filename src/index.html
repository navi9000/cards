<!doctype html>
<html lang="en">
  <head>
    <link
      rel="preload"
      href="assets/Lato-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="assets/Lato-Bold.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="assets/Lato-Black.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body class="body">
    <main class="container">
      <div class="container__inlay">
        <div class="top">
          <p class="top__subheading">Enjoy your studying!</p>
          <h1 class="top__heading">Our online courses</h1>
        </div>
        <div class="controls">
          <div class="controls__filters filters"></div>
          <div class="controls__search search">
            <input
              name="search"
              class="search__input"
              placeholder="Search course..."
              autocomplete="off"
            />
          </div>
        </div>
        <div class="course-list"></div>
      </div>
    </main>
  </body>
</html>
